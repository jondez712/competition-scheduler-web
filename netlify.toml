# Next.js on Netlify — OpenNext adapter runs automatically on build (no [[plugins]] needed for Next 13.5+).
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/
#
# Deploy: push to Git → Netlify “Add new site” → import repo (build cmd & Node are picked up from here),
#   or CLI: `npx netlify login` then `npm run deploy:netlify` (production).
# Set server-only env in Netlify: Site settings → Environment variables (see .env.example).
#   HITCHKICK_PROXY_BASE (+ optional HITCHKICK_DIRECT_BASE / HITCHKICK_API_KEY, OPENAI_*, HITCHKICK_PUBLISH_PROXY_BASE).
#
# Schedule GET runs in a Netlify serverless function; the edge/gateway often cuts off around ~30s
# (see request logs: Next.js handler ~30000ms → 502). Large competitions need a fast Hitchkick path.
# Mitigations:
#   Set HITCHKICK_DIRECT_BASE + HITCHKICK_API_KEY alongside HITCHKICK_PROXY_BASE: the app races both
#   and uses whichever responds first (avoids spending the whole budget on the slower hop).
#   Upgrade for longer function duration if you still hit limits after that.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # OpenAI “tuning” env values often match harmless defaults in code; omit from value scanning.
  # https://ntl.fyi/configure-secrets-scanning
  SECRETS_SCAN_OMIT_KEYS = "OPENAI_SCHEDULE_ASSISTANT_MODEL,OPENAI_SCHEDULE_MODEL,OPENAI_SCHEDULE_TEMPERATURE"
